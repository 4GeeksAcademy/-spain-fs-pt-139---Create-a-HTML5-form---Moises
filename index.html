<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Bootstrap demo</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>

<body class="d-flex justify-content-center mt-3">
    <div class="card border mb-3 d-flex justify-content-center" style="width: 70rem;">
        <div class="card-header bg-transparent border"><strong>Payment form example</strong></div>
        <div class="card-body">
            <div class="alert alert-danger" role="alert">
                Some fields are missing
            </div>
            <form>
                <div class="container text-center">
                    <div class="row">
                        <div class="col-4">
                            <div class="mb-3">
                                <label for="cardNumber" class="form-label d-flex justify-content-start">Card #</label>
                                <input type="text" class="form-control" id="cardNumber" placeholder="XXXXXXXXXX">
                            </div>
                        </div>
                        <div class="col-4">
                            <div class="mb-3">
                                <label for="CVC" class="form-label d-flex justify-content-start">CVC</label>
                                <input type="text" class="form-control" id="CVC" placeholder="#">
                            </div>
                        </div>
                        <div class="col-4">
                            <div class="mb-3">
                                <label for="amount" class="form-label d-flex justify-content-start">
                                    Amount
                                </label>
                                <div class="input-group">
                                    <div class="input-group-text">$</div>
                                    <input type="text" class="form-control" id="autoSizingInputGroup"
                                        placeholder="Username">
                                </div>
                            </div>

                            <div class="row">
                                <div class="col-sm">col-sm
                                </div>
                                <div class="col-sm">col-sm</div>
                                <div class="col-sm">col-sm</div>
                            </div>
                        </div>

                        <div class="mb-3">
                            <label for="expiryDate" class="form-label">Expiry date</label>
                            <input type="text" class="form-control" id="expiryDate" placeholder="MM/YY">
                        </div>
                        <div class="mb-3">
                            <label for="cvv" class="form-label">CVV</label>
                            <input type="text" class="form-control" id="cvv" placeholder="123">
                        </div>
                    </div>
                    <div class="card-footer bg-transparent border d-flex justify-content-end">
                        <button class="btn btn-secondary ms-3" type="submit">Cancel</button>
                        <button class="btn btn-primary ms-3" type="submit">Send</button>
                    </div>
                </div>
            </form>
        </div>

    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
</body>

</html>
