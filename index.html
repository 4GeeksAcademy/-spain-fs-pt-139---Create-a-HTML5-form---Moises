<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Bootstrap demo</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>

<body class="d-flex justify-content-center mt-3">
    <div class="card border mb-3 d-flex justify-content-center" style="width: 70rem;">
        <div class="card-header bg-transparent border"><strong>Payment form example</strong></div>
        <div class="card-body ">
            <div class="alert alert-danger mb-4" role="alert">
                Some fields are missing
            </div>

            <form class="row g-3 needs validation" >
                <div class="container text-center">
                    <div class="row">


                        <div class="col-6">
                            <div class="mb-3">
                                <label for="cardNumber" class="form-label d-flex justify-content-start">Card #</label>
                                <input type="text" class="form-control" id="cardNumber" value="" required placeholder="XXXXXXXXXX">
                            <div class="valid-feedback">
                                    Looks good!
                            </div>
                                <div class="invalid-feedback">
                                    Please enter a valid card number.
                                </div>
                            </div>
                        </div>
                        <div class="col-3">
                            <div class="mb-3">
                                <label for="CVC" class="form-label d-flex justify-content-start">CVC</label>
                                <input type="text" class="form-control" id="CVC" value="" required placeholder="0000">
                                <div class="valid-feedback">
                                    Looks good!
                                </div>
                                <div class="invalid-feedback">
                                    Please enter a valid CVC.
                                </div>
                            </div>
                        </div>
                        <div class="col-3">
                            <div class="mb-3">
                                <label for="amount" class="form-label d-flex justify-content-start">Amount</label>
                                <div class="input-group">
                                    <div class="input-group-text">$</div>
                                    <input type="number" class="form-control" id="autoSizingInputGroup" value="" required
                                        placeholder="Amount">
                                    <div class="valid-feedback">
                                    Looks good!
                                </div>
                                <div class="invalid-feedback">
                                    Please enter a valid amount.
                                </div>
                                </div>
                            </div>
                        </div>


                        <div class="col-6">
                            <div class="mb-3">
                                <label for="cardNumber" class="form-label d-flex justify-content-start">First
                                    name</label>
                                <input type="text" class="form-control" id="First name" value="" required>
                                <div class="valid-feedback">
                                    Looks good!
                                </div>
                                <div class="invalid-feedback">
                                    Please enter a valid first name.
                                </div>
                            </div>
                        </div>
                        <div class="col-6">
                            <div class="mb-3">
                                <label for="cardNumber" class="form-label d-flex justify-content-start">Last
                                    name</label>
                                <input type="text" class="form-control" id="Last name" value="" required>
                            </div>
                        </div>


                        <div class="col-6">
                            <div class="mb-3">
                                <label for="expiryDate" class="form-label d-flex justify-content-start">City</label>
                                <input type="text" class="form-control" id="expiryDate" value="" required>
                            </div>
                        </div>
                        <div class="col-3">
                            <div class="mb-3">
                                <label for="cvv" class="form-label d-flex justify-content-start">State</label>
                                <input type="text" class="form-control" id="cvv" value="" required placeholder="Pick a state">
                            </div>
                        </div>
                        <div class="col-3">
                            <div class="mb-3">
                                <label for="cvv" class="form-label d-flex justify-content-start">Postal Code</label>
                                <input type="text" class="form-control" id="cvv" value="" required placeholder="12345">
                            </div>
                        </div>


                        <div class="col-6">
                            <label for="cardNumber" class="form-label d-flex justify-content-start">We accept:</label>
                            <div class= "text-white bg-secondary d-flex justify-content-start p-2 rounded">
                                <div class="form-check form-check-inline ">
                                    <input class="form-check-input " type="radio" name="inlineRadioOptions" id="inlineRadio1"
                                        value="option1" required>
                                    <label class="form-check-label" for="inlineRadio1"><i class="fa-brands fa-cc-mastercard"></i></label>
                                </div>
                                <div class="form-check form-check-inline">
                                    <input class="form-check-input" type="radio" name="inlineRadioOptions" id="inlineRadio2"
                                        value="option2" required>
                                    <label class="form-check-label" for="inlineRadio2"><i class="fa-brands fa-cc-visa"></i></label>
                                </div>
                                <div class="form-check form-check-inline">
                                    <input class="form-check-input" type="radio" name="inlineRadioOptions" id="inlineRadio3"
                                        value="option3" required>
                                    <label class="form-check-label" for="inlineRadio3"><i class="fa-brands fa-cc-visa"></i></label>
                                </div>
                                <div class="form-check form-check-inline">
                                    <input class="form-check-input" type="radio" name="inlineRadioOptions" id="inlineRadio4"
                                        value="option4" required >
                                    <label class="form-check-label" for="inlineRadio4"><i class="fa-brands fa-cc-amex"></i></label>
                                </div>
                            </div>        
                        </div>
                        <div class="col-6 ">
                            
                            <label for="cardNumber" class="form-label d-flex justify-content-start">Message</label>
                            <textarea class="form-control" id="exampleFormControlTextarea1" rows="3"></textarea>
                            <p class="form-text d-flex justify-content-start"><small>Add any notes here.</small></p>
                            
                        </div>


                    </div>
                </div>

        </div>

                <div class="card-footer bg-transparent border d-flex justify-content-end">
                    <button class="btn btn-secondary ms-3" type="submit">Cancel</button>
                    <button class="btn btn-primary ms-3" type="submit">Submit</button>
                </div>
    </div>
    </form>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
</body>

</html>
